<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Puzzle Platformer</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0a0a0f;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
        font-family: monospace;
      }
      #game-container canvas {
        display: block;
        image-rendering: pixelated;
      }
      #ui-overlay {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        color: #c8e6ff;
        font-size: 13px;
        letter-spacing: 0.08em;
        opacity: 0.7;
        pointer-events: none;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <div id="ui-overlay">ARROW KEYS / WASD — MOVE &nbsp;|&nbsp; SPACE — JUMP</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
